<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30초 작업 흐름 진단</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  
  html, body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: transparent;
    color: #ffffff;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  
  .widget {
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    background: linear-gradient(180deg, #1A1D2E 0%, #0F1119 100%);
    border-radius: 16px;
    padding: 32px 24px;
    min-height: 600px;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  
  .widget::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -30%;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(167, 139, 250, 0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  
  .progress-bar {
    width: 100%;
    height: 4px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 32px;
    position: relative;
    z-index: 1;
  }
  
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #A78BFA 0%, #C4B5FD 100%);
    width: 0%;
    transition: width 0.4s ease;
    border-radius: 2px;
  }
  
  .progress-text {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.5);
    margin-bottom: 8px;
    font-weight: 500;
    position: relative;
    z-index: 1;
  }
  
  .screen {
    flex: 1;
    display: none;
    flex-direction: column;
    position: relative;
    z-index: 1;
    animation: fadeIn 0.4s ease;
  }
  
  .screen.active {
    display: flex;
  }
  
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  /* Intro Screen */
  .intro-icon {
    font-size: 56px;
    margin-bottom: 24px;
    text-align: center;
  }
  
  .intro-title {
    font-size: 26px;
    font-weight: 800;
    text-align: center;
    margin-bottom: 12px;
    letter-spacing: -0.5px;
  }
  
  .intro-subtitle {
    font-size: 15px;
    color: rgba(255, 255, 255, 0.65);
    text-align: center;
    margin-bottom: 40px;
    line-height: 1.6;
  }
  
  .intro-info {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 32px;
    border: 1px solid rgba(255, 255, 255, 0.08);
  }
  
  .intro-info-item {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.85);
    margin-bottom: 12px;
  }
  
  .intro-info-item:last-child {
    margin-bottom: 0;
  }
  
  .intro-info-icon {
    font-size: 16px;
  }
  
  /* Question Screen */
  .question-number {
    font-size: 13px;
    color: #A78BFA;
    font-weight: 600;
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }
  
  .question-text {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 28px;
    letter-spacing: -0.3px;
    line-height: 1.4;
  }
  
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }
  
  .option {
    background: rgba(255, 255, 255, 0.05);
    border: 1.5px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 16px 18px;
    color: rgba(255, 255, 255, 0.9);
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
    font-family: inherit;
    font-weight: 500;
    line-height: 1.4;
  }
  
  .option:hover {
    background: rgba(167, 139, 250, 0.1);
    border-color: rgba(167, 139, 250, 0.4);
    transform: translateX(2px);
  }
  
  .option.selected {
    background: rgba(167, 139, 250, 0.15);
    border-color: #A78BFA;
    color: #ffffff;
  }
  
  /* Buttons */
  .button-row {
    display: flex;
    gap: 8px;
    margin-top: 24px;
  }
  
  .btn {
    flex: 1;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
    letter-spacing: -0.3px;
  }
  
  .btn-primary {
    background: linear-gradient(135deg, #A78BFA 0%, #C4B5FD 100%);
    color: #1A1D2E;
  }
  
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(167, 139, 250, 0.3);
  }
  
  .btn-primary:disabled {
    background: rgba(255, 255, 255, 0.1);
    color: rgba(255, 255, 255, 0.3);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }
  
  .btn-secondary {
    background: rgba(255, 255, 255, 0.05);
    color: rgba(255, 255, 255, 0.7);
    border: 1px solid rgba(255, 255, 255, 0.1);
    flex: 0 0 80px;
  }
  
  .btn-secondary:hover {
    background: rgba(255, 255, 255, 0.1);
  }
  
  .btn-full {
    flex: 1;
  }
  
  /* Loading Screen */
  .loading {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  
  .spinner {
    width: 64px;
    height: 64px;
    border: 3px solid rgba(255, 255, 255, 0.1);
    border-top-color: #A78BFA;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 24px;
  }
  
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  
  .loading-text {
    font-size: 16px;
    color: rgba(255, 255, 255, 0.85);
    font-weight: 500;
    text-align: center;
    transition: opacity 0.3s ease;
  }
  
  /* Result Screen */
  .result-emoji {
    font-size: 64px;
    text-align: center;
    margin-bottom: 16px;
  }
  
  .result-title {
    font-size: 24px;
    font-weight: 800;
    text-align: center;
    margin-bottom: 24px;
    letter-spacing: -0.5px;
    line-height: 1.4;
  }
  
  .result-card {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
  }
  
  .result-card-title {
    font-size: 13px;
    color: #A78BFA;
    font-weight: 600;
    margin-bottom: 12px;
    letter-spacing: 0.3px;
  }
  
  .result-list {
    list-style: none;
    padding: 0;
  }
  
  .result-list li {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.85);
    margin-bottom: 8px;
    padding-left: 16px;
    position: relative;
    line-height: 1.5;
  }
  
  .result-list li::before {
    content: '·';
    position: absolute;
    left: 4px;
    color: #A78BFA;
    font-weight: 700;
  }
  
  .result-list li:last-child {
    margin-bottom: 0;
  }
  
  .result-message {
    font-size: 15px;
    color: rgba(255, 255, 255, 0.85);
    line-height: 1.6;
    margin-bottom: 24px;
    text-align: center;
  }
  
  .result-cta {
    display: block;
    background: linear-gradient(135deg, #A78BFA 0%, #C4B5FD 100%);
    color: #1A1D2E;
    text-align: center;
    padding: 16px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    text-decoration: none;
    transition: all 0.2s ease;
    letter-spacing: -0.3px;
  }
  
  .result-cta:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(167, 139, 250, 0.3);
  }
  
  .result-sub-link {
    display: block;
    text-align: right;
    margin-top: 12px;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.5);
    text-decoration: none;
    transition: color 0.2s ease;
  }
  
  .result-sub-link:hover {
    color: rgba(167, 139, 250, 0.8);
  }
  
  .result-restart {
    display: block;
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.5);
    cursor: pointer;
    text-decoration: underline;
    background: none;
    border: none;
    width: 100%;
    font-family: inherit;
  }
  
  .result-restart:hover {
    color: rgba(255, 255, 255, 0.8);
  }
  
  @media (max-width: 480px) {
    .widget {
      padding: 24px 20px;
      border-radius: 12px;
    }
    
    .intro-title {
      font-size: 22px;
    }
    
    .question-text {
      font-size: 18px;
    }
    
    .option {
      font-size: 14px;
      padding: 14px 16px;
    }
  }
</style>
</head>
<body>

<div class="widget">
  
  <!-- Intro Screen -->
  <div class="screen active" id="screen-intro">
    <div class="intro-icon">🔍</div>
    <h1 class="intro-title">30초 작업 흐름 진단</h1>
    <p class="intro-subtitle">본인에게 어떤 솔루션이 맞는지<br>9개 질문으로 확인해드려요</p>
    
    <div class="intro-info">
      <div class="intro-info-item">
        <span class="intro-info-icon">⏱️</span>
        <span>30초 ~ 1분 소요</span>
      </div>
      <div class="intro-info-item">
        <span class="intro-info-icon">🎯</span>
        <span>본인에게 맞는 솔루션 추천</span>
      </div>
      <div class="intro-info-item">
        <span class="intro-info-icon">🙋</span>
        <span>개인정보 입력 없이 진단</span>
      </div>
    </div>
    
    <button class="btn btn-primary btn-full" onclick="startDiagnosis()">진단 시작하기 →</button>
  </div>
  
  <!-- Question Screen -->
  <div class="screen" id="screen-question">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="progress-text" id="progress-text">1 / 9</div>
    
    <div class="question-number" id="question-number">Q1</div>
    <h2 class="question-text" id="question-text"></h2>
    
    <div class="options" id="options"></div>
    
    <div class="button-row">
      <button class="btn btn-secondary" id="btn-back" onclick="goBack()">이전</button>
      <button class="btn btn-primary" id="btn-next" onclick="goNext()" disabled>다음 →</button>
    </div>
  </div>
  
  <!-- Loading Screen -->
  <div class="screen" id="screen-loading">
    <div class="loading">
      <div class="spinner"></div>
      <p class="loading-text" id="loading-text">작업 흐름 분석 중...</p>
    </div>
  </div>
  
  <!-- Result Screen -->
  <div class="screen" id="screen-result">
    <div class="result-emoji" id="result-emoji"></div>
    <h2 class="result-title" id="result-title"></h2>
    
    <div class="result-card">
      <div class="result-card-title">진단 결과 요약</div>
      <ul class="result-list" id="result-summary"></ul>
    </div>
    
    <p class="result-message" id="result-message"></p>
    
    <a class="result-cta" id="result-cta" href="#" target="_blank" rel="noopener noreferrer">진단 결과 받아보기 →</a>
    <a class="result-sub-link" id="result-sub-link" href="#" target="_blank" rel="noopener noreferrer" style="display: none;"></a>
    <button class="result-restart" onclick="restart()">처음부터 다시 진단하기</button>
  </div>
  
</div>

<script>
  // ============================================
  // 진단 질문 데이터
  // ============================================
  const questions = [
    {
      number: 'Q1',
      text: '현재 활동 형태가 어떻게 되세요?',
      options: [
        { text: '1인 프리랜서', score: 3 },
        { text: '프리랜서 + 엔잡', score: 3 },
        { text: '소규모 팀 운영 (2~5인)', score: 2 },
        { text: '회사/스튜디오 소속 (6인 이상)', score: 1 }
      ]
    },
    {
      number: 'Q2',
      text: '평소 동시에 진행하는 프로젝트는 보통 몇 건?',
      options: [
        { text: '1~2건', score: 0 },
        { text: '3~5건', score: 2 },
        { text: '6~10건', score: 3 },
        { text: '10건 이상', score: 3 }
      ]
    },
    {
      number: 'Q3',
      text: '클라이언트 정보 (요청/마감/결제) 어디에 정리하세요?',
      options: [
        { text: '카톡/메일/메모앱 (여러 곳에 흩어짐)', score: 3 },
        { text: '엑셀/스프레드시트 한 곳', score: 2 },
        { text: '노션 (잘 활용 중)', score: 0 },
        { text: '노션 (받았는데 활용 못 함)', score: 3 }
      ]
    },
    {
      number: 'Q4',
      text: '"지난번 시안 어디 있더라" 검색 자주 하세요?',
      options: [
        { text: '거의 안 함', score: 0 },
        { text: '가끔 (한 달에 몇 번)', score: 1 },
        { text: '자주 (일주일에 몇 번)', score: 2 },
        { text: '매일 (검색 시간이 작업 시간만큼)', score: 3 }
      ]
    },
    {
      number: 'Q5',
      text: '노션 데이터베이스 기능 사용해보셨어요?',
      options: [
        { text: '자주 사용해서 능숙함', score: 0 },
        { text: '사용해봤는데 익숙치 않음', score: 3 },
        { text: '이름만 들어봤음', score: 3 },
        { text: '모름', score: 2 }
      ]
    },
    {
      number: 'Q6',
      text: '본인 작업 흐름 한 번에 정리해본 적 있으세요?',
      options: [
        { text: '정리되어 있고 잘 사용 중', score: 0 },
        { text: '정리 시도했는데 안 됨', score: 3 },
        { text: '정리하고 싶은데 시간 없음', score: 3 },
        { text: '정리할 생각 못 해봤음', score: 1 }
      ]
    },
    {
      number: 'Q7',
      text: '잔금 받았는지 헷갈린 적 있으세요?',
      options: [
        { text: '거의 없음 (시스템 갖춰져 있음)', score: 0 },
        { text: '가끔', score: 1 },
        { text: '자주', score: 2 },
        { text: '두 달 후에야 미수금 발견한 적 있음', score: 3 }
      ]
    },
    {
      number: 'Q8',
      text: '디자인 작업 관리 템플릿 써보신 적 있으세요?',
      options: [
        { text: '써봤는데 잘 활용 중', score: 0 },
        { text: '써봤는데 일부만 활용', score: 2 },
        { text: '써봤는데 거의 안 씀', score: 3 },
        { text: '없음', score: 1 }
      ]
    },
    {
      number: 'Q9',
      text: '본인 작업 흐름에 맞춰 셋업되어 있는 노션을 받는다면?',
      options: [
        { text: '결제 의향 있음 (확실)', score: 6 },
        { text: '결제 의향 있음 (가격 보고 결정)', score: 4 },
        { text: '일단 디자이너 범용 템플릿부터 써볼래요', score: 1 },
        { text: '노션 셋업은 본인이 할 수 있어요', score: 0 }
      ]
    }
  ];
  
  // ============================================
  // 결과 분기 데이터
  // ============================================
  const results = {
    A: {
      emoji: '🎯',
      title: '디자인 템플릿보다 1:1 셋업이 더 맞으세요',
      summary: [
        '동시 진행 프로젝트 많음',
        '정리 시간 자체가 부담',
        '노션 받았는데 활용 못 하고 계심'
      ],
      message: '본인 페이스에 맞춘 1:1 노션 셋업이 필요해요.<br>직접 작업 흐름 듣고 시스템 설계해드릴게요.',
      ctaText: '1:1 셋업 신청 →',
      ctaLink: 'https://tally.so/r/aQazgq',
      subLink: null
    },
    B: {
      emoji: '📦',
      title: '1:1 셋업보다는 디자인 템플릿이 잘 맞아요',
      summary: [
        '노션 어느 정도 활용 가능하심',
        '작업 흐름 정리 시간 있으심',
        '직접 셋업 가능한 페이스'
      ],
      message: '본인이 직접 셋업하실 수 있는<br>디자인 OS 템플릿을 추천드려요.',
      ctaText: '디자인 OS 보기 →',
      ctaLink: 'https://subsequent-lint-101.notion.site/Design-Process-34ae0a14fc4e8120b732cac962539655',
      subLink: {
        text: '1:1 셋업도 궁금해요 →',
        url: 'https://subsequent-lint-101.notion.site/1-30-OS-1-1-36ae0a14fc4e80f39e3bc89721a286e0'
      }
    },
    C: {
      emoji: '🙇',
      title: '아쉽지만 1:1 제작 대상이 아니에요',
      summary: [
        '노션 능숙하게 사용 중',
        '시스템 이미 갖춰져 있으심',
        '1:1 셋업/디자인 OS 모두 큰 도움 안 될 가능성'
      ],
      message: '본인 사업이 더 발전하실 때 다시 와주세요.<br>스레드/인스타에서 디자이너 콘텐츠 종종 올려요.',
      ctaText: '노션쟁이 인스타 →',
      ctaLink: 'https://www.instagram.com/notion_jaeng_e/',
      subLink: {
        text: '노션쟁이 콘텐츠 더 보기 →',
        url: 'https://subsequent-lint-101.notion.site/1-30-OS-1-1-36ae0a14fc4e80f39e3bc89721a286e0'
      }
    }
  };
  
  // ============================================
  // 로딩 멘트
  // ============================================
  const loadingMessages = [
    '작업 흐름 분석 중...',
    '디자이너 페인 패턴 확인 중...',
    '최적의 솔루션 매칭 중...'
  ];
  
  // ============================================
  // 상태 관리
  // ============================================
  let currentQuestion = 0;
  let answers = [];
  
  // ============================================
  // 화면 전환
  // ============================================
  function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
  }
  
  // ============================================
  // 진단 시작
  // ============================================
  function startDiagnosis() {
    currentQuestion = 0;
    answers = [];
    showQuestion();
    showScreen('screen-question');
  }
  
  // ============================================
  // 질문 렌더링
  // ============================================
  function showQuestion() {
    const q = questions[currentQuestion];
    document.getElementById('question-number').textContent = q.number;
    document.getElementById('question-text').textContent = q.text;
    document.getElementById('progress-text').textContent = `${currentQuestion + 1} / ${questions.length}`;
    document.getElementById('progress-fill').style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;
    
    const optionsEl = document.getElementById('options');
    optionsEl.innerHTML = '';
    
    q.options.forEach((opt, idx) => {
      const btn = document.createElement('button');
      btn.className = 'option';
      btn.textContent = opt.text;
      btn.onclick = () => selectOption(idx);
      
      // 기존 답변 복원
      if (answers[currentQuestion] !== undefined && answers[currentQuestion].index === idx) {
        btn.classList.add('selected');
      }
      
      optionsEl.appendChild(btn);
    });
    
    // 이전 버튼 활성화
    document.getElementById('btn-back').style.display = currentQuestion === 0 ? 'none' : 'block';
    
    // 다음 버튼 - 마지막 질문이면 텍스트 변경
    const btnNext = document.getElementById('btn-next');
    btnNext.textContent = currentQuestion === questions.length - 1 ? '결과 보기 →' : '다음 →';
    btnNext.disabled = answers[currentQuestion] === undefined;
  }
  
  // ============================================
  // 옵션 선택
  // ============================================
  function selectOption(idx) {
    const q = questions[currentQuestion];
    answers[currentQuestion] = {
      index: idx,
      score: q.options[idx].score
    };
    
    // UI 업데이트
    document.querySelectorAll('.option').forEach((el, i) => {
      el.classList.toggle('selected', i === idx);
    });
    
    // 다음 버튼 활성화
    document.getElementById('btn-next').disabled = false;
  }
  
  // ============================================
  // 다음 질문
  // ============================================
  function goNext() {
    if (currentQuestion < questions.length - 1) {
      currentQuestion++;
      showQuestion();
    } else {
      // 마지막 질문 → 로딩 → 결과
      showLoading();
    }
  }
  
  // ============================================
  // 이전 질문
  // ============================================
  function goBack() {
    if (currentQuestion > 0) {
      currentQuestion--;
      showQuestion();
    }
  }
  
  // ============================================
  // 로딩 화면
  // ============================================
  function showLoading() {
    showScreen('screen-loading');
    const loadingTextEl = document.getElementById('loading-text');
    
    let msgIdx = 0;
    loadingTextEl.textContent = loadingMessages[0];
    
    const interval = setInterval(() => {
      msgIdx++;
      if (msgIdx < loadingMessages.length) {
        loadingTextEl.style.opacity = '0';
        setTimeout(() => {
          loadingTextEl.textContent = loadingMessages[msgIdx];
          loadingTextEl.style.opacity = '1';
        }, 200);
      }
    }, 800);
    
    setTimeout(() => {
      clearInterval(interval);
      showResult();
    }, 2400);
  }
  
  // ============================================
  // 결과 계산 + 출력
  // ============================================
  function showResult() {
    const totalScore = answers.reduce((sum, a) => sum + a.score, 0);
    
    let resultKey;
    if (totalScore >= 22) {
      resultKey = 'A';
    } else if (totalScore >= 12) {
      resultKey = 'B';
    } else {
      resultKey = 'C';
    }
    
    const r = results[resultKey];
    
    document.getElementById('result-emoji').textContent = r.emoji;
    document.getElementById('result-title').textContent = r.title;
    document.getElementById('result-message').innerHTML = r.message;
    
    const summaryEl = document.getElementById('result-summary');
    summaryEl.innerHTML = '';
    r.summary.forEach(item => {
      const li = document.createElement('li');
      li.textContent = item;
      summaryEl.appendChild(li);
    });
    
    const ctaEl = document.getElementById('result-cta');
    ctaEl.textContent = r.ctaText;
    ctaEl.href = r.ctaLink;
    
    const subLinkEl = document.getElementById('result-sub-link');
    if (r.subLink) {
      subLinkEl.textContent = r.subLink.text;
      subLinkEl.href = r.subLink.url;
      subLinkEl.style.display = 'block';
    } else {
      subLinkEl.style.display = 'none';
    }
    
    showScreen('screen-result');
  }
  
  // ============================================
  // 다시 시작
  // ============================================
  function restart() {
    currentQuestion = 0;
    answers = [];
    showScreen('screen-intro');
  }
</script>

</body>
</html>
